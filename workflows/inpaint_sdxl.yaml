name: inpaint_sdxl
title: "Inpaint / VFX (SDXL masked regenerate)"
kind: edit
description: "Regenerate only the masked region of an image from a prompt (SDXL masked latent). Paint a mask over what to change; the rest is preserved. No new model."
template: templates/inpaint_sdxl.api.json
client_outputs: ["10"]                         # SaveImage

inputs:
  image:
    api: ["1", "inputs", "image"]              # LoadImage (source, in ComfyUI input/)
    type: image
  mask:
    api: ["2", "inputs", "image"]              # LoadImageMask (alpha = area to regenerate)
    type: image

inject:
  image:
    api: ["1", "inputs", "image"]
    type: image
    required: true
    description: "Source image (filename, relative to ComfyUI input/)."
  mask:
    api: ["2", "inputs", "image"]
    type: image
    required: true
    description: "Mask image (alpha channel = region to regenerate)."
  prompt:
    api: ["4", "inputs", "text"]
    type: string
    default: ""
    description: "What to paint into the masked region."
  negative:
    api: ["5", "inputs", "text"]
    type: string
    default: "low quality, blurry, artifacts, distorted"
  denoise:
    api: ["8", "inputs", "denoise"]
    type: float
    default: 1.0
    min: 0.1
    max: 1.0
    description: "1.0 = fully replace the masked area; lower keeps more of the original."
  steps:
    api: ["8", "inputs", "steps"]
    type: int
    default: 25
    min: 1
    max: 60
  cfg:
    api: ["8", "inputs", "cfg"]
    type: float
    default: 7.0
    min: 1.0
    max: 20.0
  seed:
    api: ["8", "inputs", "seed"]
    type: seed
    default: -1
